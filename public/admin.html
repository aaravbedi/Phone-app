<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e0e10" />
  <title>Admin — Robotics Data Collection</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container admin-container">
    <h1>Admin Dashboard</h1>
    <p class="subtitle">All egocentric video uploads.</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Uploads</div>
        <div class="stat-value" id="totalUploads">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Storage</div>
        <div class="stat-value" id="totalStorage">—</div>
      </div>
    </div>

    <div class="table-wrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Environment</th>
            <th>Size (MB)</th>
            <th>Uploaded</th>
            <th>Video</th>
          </tr>
        </thead>
        <tbody id="dataBody"></tbody>
      </table>
      <div class="empty hidden" id="emptyState">No uploads yet.</div>
    </div>
  </div>

  <div class="modal hidden" id="videoModal" role="dialog" aria-modal="true" aria-label="Video preview">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <video id="modalVideo" controls playsinline></video>
      <div class="modal-caption" id="modalCaption"></div>
    </div>
  </div>

  <script>
    function formatBytes(bytes) {
      return (bytes / (1024 * 1024)).toFixed(2);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString();
    }

    async function loadData() {
      try {
        const res = await fetch('/admin/data');
        const data = await res.json();
        renderData(data);
      } catch (err) {
        document.getElementById('dataBody').innerHTML =
          '<tr><td colspan="7">Failed to load data: ' + err.message + '</td></tr>';
      }
    }

    function renderData(data) {
      const body = document.getElementById('dataBody');
      const empty = document.getElementById('emptyState');
      const table = document.getElementById('dataTable');

      document.getElementById('totalUploads').textContent = data.length;
      const totalBytes = data.reduce((sum, e) => sum + (e.fileSize || 0), 0);
      document.getElementById('totalStorage').textContent = formatBytes(totalBytes) + ' MB';

      if (data.length === 0) {
        table.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      table.classList.remove('hidden');
      empty.classList.add('hidden');

      body.innerHTML = data
        .slice()
        .reverse()
        .map((e) => `
          <tr>
            <td class="mono">${escapeHtml(e.userID || '')}</td>
            <td>${escapeHtml(e.name || '')}</td>
            <td>${escapeHtml(e.email || '')}</td>
            <td>${escapeHtml(e.environmentType || '')}</td>
            <td>${formatBytes(e.fileSize || 0)}</td>
            <td>${formatDate(e.uploadedAt)}</td>
            <td>
              <button class="btn-play" data-filename="${escapeHtml(e.filename || '')}" data-userid="${escapeHtml(e.userID || '')}">
                Play
              </button>
            </td>
          </tr>
        `)
        .join('');

      body.querySelectorAll('.btn-play').forEach((btn) => {
        btn.addEventListener('click', () => {
          openVideoModal(btn.dataset.filename, btn.dataset.userid);
        });
      });
    }

    const modal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideo');
    const modalCaption = document.getElementById('modalCaption');

    function openVideoModal(filename, userID) {
      if (!filename) return;
      modalVideo.src = '/uploads/' + encodeURIComponent(filename);
      modalCaption.textContent = userID ? userID + ' — ' + filename : filename;
      modal.classList.remove('hidden');
      modalVideo.play().catch(() => {});
    }

    function closeVideoModal() {
      modal.classList.add('hidden');
      modalVideo.pause();
      modalVideo.removeAttribute('src');
      modalVideo.load();
    }

    document.getElementById('modalClose').addEventListener('click', closeVideoModal);
    document.getElementById('modalBackdrop').addEventListener('click', closeVideoModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeVideoModal();
    });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadData();
  </script>
</body>
</html>
